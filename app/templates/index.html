{% extends 'cvm_page_v1.html' %}

{% block style%}
<link rel="stylesheet" href="/static/css/repository.css" />
<script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>

<script src="/static/config/project.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider/distribute/nouislider.min.css">
<script src="https://cdn.jsdelivr.net/npm/nouislider/distribute/nouislider.min.js"></script>
<script src="/static/config/repository_config.js"></script>
<style>
    @import url(https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css);
</style>

{% endblock %}

{% block body %}
<div id="viewer2dWrapper">
    <!-- Full-bleed map (iframe to CVM's /data/3d Cesium page) -->
    <div id="mapContainer">
        <iframe src="/data/3d" id="3dIframe"></iframe>
    </div>

    <!-- Mobile toggle for sidebar -->
    <button id="toggleSidebar" class="btn-toggle-sidebar" type="button" title="Show/Hide Controls">&#9776;</button>

    <!-- Floating sidebar -->
    <div id="sidebarPanel">

        <!-- Models card -->
        <div class="card-2d">
            <div class="card-2d-title">CVM Models</div>

            <div class="accordion-section open">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">3D Models</span>
                </button>
                <div class="accordion-body">
                    <div class="model-table-wrap">
                        <div id="fileTable"></div>
                    </div>
                </div>
            </div>

            <div class="accordion-section">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">2D Models</span>
                </button>
                <div class="accordion-body">
                    <div id="auxTableContainer"></div>
                </div>
            </div>
        </div>

        <!-- Filters card -->
        <div class="card-2d">
            <div class="card-2d-title">Filters</div>

            <div class="accordion-section open">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">Latitude (&deg;N)</span>
                    <span class="accordion-range">
                        <span id="lat_min_label">--</span> &ndash; <span id="lat_max_label">--</span>
                    </span>
                </button>
                <div class="accordion-body">
                    <div id="latitudeSlider" class="accordion-slider"></div>
                    <input type="hidden" id="lat_min" name="lat_min" />
                    <input type="hidden" id="lat_max" name="lat_max" />
                </div>
            </div>

            <div class="accordion-section open">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">Longitude (&deg;E)</span>
                    <span class="accordion-range">
                        <span id="lon_min_label">--</span> &ndash; <span id="lon_max_label">--</span>
                    </span>
                </button>
                <div class="accordion-body">
                    <div id="longitudeSlider" class="accordion-slider"></div>
                    <input type="hidden" id="lon_min" name="lon_min" />
                    <input type="hidden" id="lon_max" name="lon_max" />
                </div>
            </div>

            <div class="accordion-section">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">Depth (km)</span>
                </button>
                <div class="accordion-body">
                    <div class="field-row">
                        <label>Depth range</label>
                        <div class="range-inputs">
                            <input id="depth_min" name="depth_min" type="number" step="0.01"
                                title="Minimum depth in km" />
                            <span class="range-sep">to</span>
                            <input id="depth_max" name="depth_max" type="number" step="0.01"
                                title="Maximum depth in km" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-section">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">Filter Variables</span>
                </button>
                <div class="accordion-body">
                    <div class="field-row">
                        <label>Ctrl/Cmd-click to multi-select</label>
                        <select id="variableSelect" multiple size="6"></select>
                    </div>
                </div>
            </div>

            <div class="filter-buttons">
                <button id="applyFilterBtn" type="button" class="btn-primary" onclick="filterTable()">Apply</button>
                <button id="clearFilterBtn" type="button" class="btn-secondary" onclick="clearFilters()">Clear</button>
            </div>
        </div>

        <!-- Coverage comparison card -->
        <div class="card-2d">
            <div class="card-2d-title">Coverage Comparison</div>

            <div class="accordion-section">
                <button type="button" class="accordion-header" onclick="toggleAccordion(this)">
                    <span class="accordion-arrow">&#9660;</span>
                    <span class="accordion-label">Compare up to 8 models</span>
                </button>
                <div class="accordion-body">
                    <div id="modelSelectionBoxes">
                        <!-- Chip colors mirror cesiumColorList[1..8] in repository_config.js so
                             the dot matches the outline drawn on the 3D map. -->
                        <div class="modelSelectRow" style="--chip-color:#dc2626;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect1" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#16a34a;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect2" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#2563eb;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect3" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#eab308;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect4" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#f8fafc;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect5" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#92400e;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect6" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#7e22ce;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect7" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <div class="modelSelectRow" style="--chip-color:#ec4899;">
                            <span class="modelSelectChip"></span>
                            <select id="modelSelect8" class="modelSelect"><option value="">Select a model</option></select>
                        </div>
                        <button id="clearModelsBtn" type="button" class="clearModelsBtn">Clear Selected Models</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Metadata side panel (slides in from right when a model is clicked) -->
    <div class="metadata-panel" id="metadataPanel">
        <div class="metadata-panel-header">
            <h3 id="mmodelname">Model Metadata</h3>
            <button type="button" class="btn-close-metadata" onclick="closeMetadataPanel()" aria-label="Close">&times;</button>
        </div>
        <div class="metadata-panel-body">
            <div id="jsonContent">
                <span id="cmodelname" style="display:none;"></span>
                <span class="info-message">Click on a model to view its metadata.</span>
            </div>
        </div>
    </div>

    <!-- Bottom-right toggle to open / close the metadata panel -->
    <button type="button" class="btn-show-metadata" id="showMetadataBtn" onclick="toggleMetadataPanel()" title="Model metadata" aria-label="Model metadata">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
        </svg>
    </button>
</div>

{{ self.scripts() }}
{% endblock %}

{% block scripts %}
<script src="/static/js/shared.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<script>
    let
        auxData,
        auxLabel = [],
        auxTitle,
        auxCitation,
        auxFillOpacity,
        auxLineWidth,
        auxDecimation,
        auxMarker;

    // --- UI helpers ---

    function toggleAccordion(headerEl) {
        const section = headerEl && headerEl.closest(".accordion-section");
        if (section) section.classList.toggle("open");
    }

    function openMetadataPanel() {
        document.getElementById("metadataPanel")?.classList.add("open");
    }

    function closeMetadataPanel() {
        document.getElementById("metadataPanel")?.classList.remove("open");
    }

    function toggleMetadataPanel() {
        document.getElementById("metadataPanel")?.classList.toggle("open");
    }

    // Load auxiliary (2D) model config and build the 2D table
    async function loadAuxConfig() {
        try {
            const response = await fetch("/load-aux-config-s3/");
            const data = await response.json();
            auxData = data.auxData;
            auxLabel = data.auxLabel;
            auxTitle = data.auxTitle;
            auxCitation = data.auxCitation;
            auxFillOpacity = data.auxFillOpacity;
            auxLineWidth = data.auxLineWidth;
            auxDecimation = data.auxDecimation;
            auxMarker = data.auxMarker;
            createAuxTable();
        } catch (error) {
            console.error("Error loading auxiliary config:", error);
        }
    }

    window.addEventListener("DOMContentLoaded", loadAuxConfig);

    function populateLatLonInputs() {
        document.getElementById('lat_min').value = south;
        document.getElementById('lat_max').value = north;
        document.getElementById('lon_min').value = west;
        document.getElementById('lon_max').value = east;
        const setLabel = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = (+v).toFixed(1) + '°'; };
        setLabel('lat_min_label', south);
        setLabel('lat_max_label', north);
        setLabel('lon_min_label', west);
        setLabel('lon_max_label', east);
    }

    // Lat/lon dual-thumb sliders. Range = study area bounds (south..north, west..east).
    // The hidden #lat_min/#lat_max/#lon_min/#lon_max inputs are kept in sync so the
    // existing filterTable() logic that reads them still works unchanged.
    function initLatLonSliders() {
        if (typeof noUiSlider === 'undefined') {
            console.error('noUiSlider not loaded');
            return;
        }
        const latEl = document.getElementById('latitudeSlider');
        const lonEl = document.getElementById('longitudeSlider');

        if (latEl && !latEl.noUiSlider) {
            noUiSlider.create(latEl, {
                start: [south, north],
                connect: true,
                range: { min: south, max: north },
                step: 0.1,
            });
            latEl.noUiSlider.on('update', (values) => {
                const lo = parseFloat(values[0]).toFixed(2);
                const hi = parseFloat(values[1]).toFixed(2);
                document.getElementById('lat_min').value = lo;
                document.getElementById('lat_max').value = hi;
                document.getElementById('lat_min_label').textContent = parseFloat(lo).toFixed(1) + '°';
                document.getElementById('lat_max_label').textContent = parseFloat(hi).toFixed(1) + '°';
            });
            latEl.noUiSlider.on('change', filterTable);
        }

        if (lonEl && !lonEl.noUiSlider) {
            noUiSlider.create(lonEl, {
                start: [west, east],
                connect: true,
                range: { min: west, max: east },
                step: 0.1,
            });
            lonEl.noUiSlider.on('update', (values) => {
                const lo = parseFloat(values[0]).toFixed(2);
                const hi = parseFloat(values[1]).toFixed(2);
                document.getElementById('lon_min').value = lo;
                document.getElementById('lon_max').value = hi;
                document.getElementById('lon_min_label').textContent = parseFloat(lo).toFixed(1) + '°';
                document.getElementById('lon_max_label').textContent = parseFloat(hi).toFixed(1) + '°';
            });
            lonEl.noUiSlider.on('change', filterTable);
        }
    }

    function createHtmlFromJson(jsonData) {
        function processJson(jsonData) {
            let htmlContent = '<div class="json-container">';
            for (let key in jsonData) {
                if (typeof jsonData[key] === 'object' && jsonData[key] !== null) {
                    htmlContent += `<div><b>${key}:</b>${processJson(jsonData[key])}</div>`;
                } else {
                    htmlContent += `<div><b>${key}:</b> ${jsonData[key]}</div>`;
                }
            }
            htmlContent += '</div>';
            return htmlContent;
        }
        return processJson(jsonData);
    }

    // Extract unique variables from the 9th column of the table and populate the select dropdown
    async function extractAndPopulateVariables() {
        const rows = document.querySelectorAll('#fileTable tr');
        const variableSet = new Set();

        let variablesList = [];
        try {
            const response = await fetch('../static/config/variables.json');
            variablesList = await response.json();
        } catch (error) {
            console.error('Error fetching variables JSON:', error);
        }

        rows.forEach((row, index) => {
            if (index === 0) return;
            const lastColumnText = row.cells[8]?.textContent?.trim() || '';
            const variables = lastColumnText
                .split('f(')[0]
                .split(',')
                .map(v => v.trim());
            variables.forEach(variable => {
                if (variable) variableSet.add(variable);
            });
        });

        const variableSetArray = Array.from(variableSet);
        const filteredVariablesList = variablesList.filter(variable => variableSet.has(variable));
        variableSetArray.forEach(variable => {
            if (!filteredVariablesList.includes(variable)) {
                filteredVariablesList.push(variable);
            }
        });

        const variableSelect = document.getElementById('variableSelect');
        variableSelect.innerHTML = '';
        filteredVariablesList.forEach(variable => {
            const option = document.createElement('option');
            option.value = variable;
            option.textContent = variable;
            variableSelect.appendChild(option);
        });
    }

    async function filterTable() {
        const iframe = document.getElementById('3dIframe');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

        const lat_min = parseFloat(document.getElementById('lat_min').value);
        const lat_max = parseFloat(document.getElementById('lat_max').value);
        const lon_min = parseFloat(document.getElementById('lon_min').value);
        const lon_max = parseFloat(document.getElementById('lon_max').value);
        const depth_min = parseFloat(document.getElementById('depth_min').value);
        const depth_max = parseFloat(document.getElementById('depth_max').value);
        const selectedVariables = $('#variableSelect').val() || [];

        let variableMapping = {};
        try {
            const response = await fetch('../static/config/variables.json');
            variableMapping = await response.json();
        } catch (error) {
            console.error('Error fetching variable mapping JSON:', error);
        }

        const wholeAreaCondition = false;
        if (iframeDoc) {
            const iframeWindow = iframe.contentWindow;
            if (!wholeAreaCondition) {
                iframeWindow.filterOutline(lat_max, lat_min, lon_max, lon_min, 2, "studyAreaOutline", 0);
            } else {
                iframeWindow.filterOutline(lat_max, lat_min, lon_max, lon_min, 0, "studyAreaOutline", 0);
            }
        }

        const rows = document.querySelectorAll('#fileTable tr');
        rows.forEach((row, index) => {
            if (index === 0) return;
            const latMinVal = parseFloat(row.cells[3].textContent);
            const latMaxVal = parseFloat(row.cells[4].textContent);
            const lonMinVal = parseFloat(row.cells[5].textContent);
            const lonMaxVal = parseFloat(row.cells[6].textContent);
            const rowVariables = row.cells[8].textContent.split('f(')[0].split(',').map(v => v.trim());
            const minDepthVal = parseFloat(row.cells[9].textContent);
            const maxDepthVal = parseFloat(row.cells[10].textContent);

            const latLonCondition = isNaN(lat_min) || isNaN(lat_max) || isNaN(lon_min) || isNaN(lon_max) ||
                (latMinVal <= lat_max && latMaxVal >= lat_min && lonMinVal <= lon_max && lonMaxVal >= lon_min);

            const depthCondition = isNaN(depth_min) || isNaN(depth_max) ||
                (minDepthVal <= depth_max && maxDepthVal >= depth_min);

            const variableCondition = selectedVariables.length === 0 || selectedVariables.some(selectedVar => {
                const mappedValues = (variableMapping[selectedVar] || []).map(v => v.trim());
                const rowVariablesNormalized = rowVariables.map(rv => rv.trim());
                return rowVariablesNormalized.includes(selectedVar.trim()) ||
                    rowVariablesNormalized.some(rv => mappedValues.includes(rv));
            });

            row.style.display = (latLonCondition && depthCondition && variableCondition) ? '' : 'none';
        });
    }

    function clearFilters() {
        const latEl = document.getElementById('latitudeSlider');
        const lonEl = document.getElementById('longitudeSlider');
        if (latEl && latEl.noUiSlider) latEl.noUiSlider.set([south, north]);
        else { document.getElementById('lat_min').value = south; document.getElementById('lat_max').value = north; }
        if (lonEl && lonEl.noUiSlider) lonEl.noUiSlider.set([west, east]);
        else { document.getElementById('lon_min').value = west; document.getElementById('lon_max').value = east; }
        document.getElementById('depth_min').value = '';
        document.getElementById('depth_max').value = '';
        const vSel = document.getElementById('variableSelect');
        if (vSel) Array.from(vSel.options).forEach(o => o.selected = false);
        filterTable();
    }

    function loadFileListAndJSON(model) {
        const fileTable = document.getElementById('fileTable');
        if (!fileTable) {
            console.error("fileTable element not found");
            return;
        }

        function hideAllRadioButtonsExceptChecked() {
            const radios = fileTable.querySelectorAll('input[type="radio"]');
            radios.forEach(radio => {
                if (radio.checked) {
                    radio.disabled = false;
                    radio.parentNode.style.opacity = 1;
                } else {
                    radio.disabled = true;
                    radio.parentNode.style.opacity = 0.5;
                }
            });
        }

        function selectOptionInIframe(model) {
            const iframe = document.getElementById('3dIframe');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            const select = iframeDoc.getElementById('data-file');
            if (!select) {
                console.warn('Select element not found in iframe');
                return;
            }
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].text === model) {
                    select.selectedIndex = i;
                    select.dispatchEvent(new Event('click'));
                    return;
                }
            }
            console.warn('Model option not found in iframe:', model);
        }

        function display_metadata(model, fileName) {
            const apiUrl = `/data/fetch_json_s3?file_name=${encodeURIComponent(fileName)}`;
            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(jsonData => {
                    document.getElementById("mmodelname").textContent = model + " Metadata";
                    document.getElementById("jsonContent").innerHTML = createHtmlFromJson(jsonData);
                    openMetadataPanel();
                })
                .catch(error => {
                    console.error('Error fetching metadata:', error);
                });
        }

        fetch('/data/list_json_files_s3/' + model)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text();
            })
            .then(html => {
                fileTable.innerHTML = html;

                extractAndPopulateVariables();
                populateModelSelectionBoxes();

                const firstRow = fileTable.querySelector('tr:nth-child(2)');
                if (!firstRow) {
                    console.warn("No data rows in fileTable");
                    return;
                }

                const radio = fileTable.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                    hideAllRadioButtonsExceptChecked();
                }

                let modelName = firstRow.querySelector('td:nth-child(2)').textContent.trim();
                const cmodelname = document.getElementById('cmodelname');
                if (cmodelname) cmodelname.innerHTML = modelName;

                fileTable.addEventListener('click', function (event) {
                    const target = event.target;
                    if (target.tagName === 'TD' && target.parentNode.cells[1] === target) {
                        const rows = fileTable.querySelectorAll('tr');
                        rows.forEach(row => row.classList.remove('highlighted-row'));
                        target.parentNode.classList.add('highlighted-row');

                        modelName = target.parentNode.cells[1].textContent;
                        const filename = target.parentNode.cells[7].textContent;
                        selectOptionInIframe(modelName);
                        const radio = target.parentNode.cells[0].querySelector('input[type="radio"]');
                        if (radio) {
                            radio.checked = true;
                            hideAllRadioButtonsExceptChecked();
                        }
                        if (cmodelname) cmodelname.innerHTML = modelName;
                        display_metadata(modelName, filename + '.json');
                    }
                });

                filterTable();
            })
            .catch(error => console.error('Error fetching file list:', error));
    }

    function populateModelSelectionBoxes() {
        const rows = document.querySelectorAll('#fileTable tr');
        const modelOptions = [];
        rows.forEach((row, index) => {
            if (index === 0) return;
            const modelName = row.cells[1].textContent.trim();
            if (modelName) modelOptions.push(modelName);
        });

        const modelSelects = document.querySelectorAll('.modelSelect');
        modelSelects.forEach((select, index) => {
            select.innerHTML = '';
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = 'Select a model';
            select.appendChild(defaultOption);

            modelOptions.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                select.appendChild(option);
            });

            select.setAttribute('data-previous-value', '');
            select.addEventListener('change', function () {
                handleModelSelection(this, index + 1);
            });
        });
    }

    function handleModelSelection(select, modelIndex) {
        const selectedModel = select.value;
        const previouslySelectedModel = select.getAttribute('data-previous-value');

        if (selectedModel) {
            if (isModelAlreadySelected(selectedModel, select)) {
                alert(`The model "${selectedModel}" has already been selected. Please choose another model.`);
                select.value = previouslySelectedModel;
            } else {
                if (previouslySelectedModel) enableModelOption(previouslySelectedModel);
                findModelCoordinates(selectedModel, modelIndex);
                select.setAttribute('data-previous-value', selectedModel);
                disableSelectedModels();
            }
        } else if (previouslySelectedModel) {
            findModelCoordinates(previouslySelectedModel, -1);
            enableModelOption(previouslySelectedModel);
            select.setAttribute('data-previous-value', '');
        }
    }

    function isModelAlreadySelected(model, currentSelect) {
        const modelSelects = document.querySelectorAll('.modelSelect');
        for (let select of modelSelects) {
            if (select !== currentSelect && select.value === model) return true;
        }
        return false;
    }

    function disableSelectedModels() {
        const modelSelects = document.querySelectorAll('.modelSelect');
        const selectedModels = Array.from(modelSelects).map(select => select.value);
        modelSelects.forEach(select => {
            const options = select.options;
            for (let i = 0; i < options.length; i++) {
                options[i].disabled =
                    selectedModels.includes(options[i].value) && options[i].value !== '';
            }
        });
    }

    function enableModelOption(model) {
        const modelSelects = document.querySelectorAll('.modelSelect');
        modelSelects.forEach(select => {
            const options = select.options;
            for (let i = 0; i < options.length; i++) {
                if (options[i].value === model) options[i].disabled = false;
            }
        });
    }

    function findModelCoordinates(modelName, modelIndex) {
        const rows = document.querySelectorAll('#fileTable tr');
        rows.forEach((row, index) => {
            if (index === 0) return;
            if (row.cells[1].textContent.trim() === modelName) {
                const latMinVal = parseFloat(row.cells[3].textContent);
                const latMaxVal = parseFloat(row.cells[4].textContent);
                const lonMinVal = parseFloat(row.cells[5].textContent);
                const lonMaxVal = parseFloat(row.cells[6].textContent);
                displayCoordinates(latMinVal, latMaxVal, lonMinVal, lonMaxVal, modelName, modelIndex);
            }
        });
    }

    function displayCoordinates(latMin, latMax, lonMin, lonMax, modelName, modelIndex) {
        const iframe = document.getElementById('3dIframe');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        if (iframeDoc) {
            iframe.contentWindow.filterOutline(latMax, latMin, lonMax, lonMin, 8, modelName, modelIndex);
        }
    }

    function clearAllModels() {
        const modelSelects = document.querySelectorAll('.modelSelect');
        modelSelects.forEach(select => {
            const previouslySelectedModel = select.getAttribute('data-previous-value');
            if (previouslySelectedModel) {
                findModelCoordinates(previouslySelectedModel, -1);
                enableModelOption(previouslySelectedModel);
            }
            select.value = '';
            select.setAttribute('data-previous-value', '');
            select.dispatchEvent(new Event('change'));
        });
    }

    async function summarizeGeoJSON(fileName, label, title, reference, decimation) {
        try {
            const apiUrl = `/data/fetch_json_s3?file_name=${encodeURIComponent(fileName)}&prefix_key=geojson`;
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            const data = await response.json();
            if (!data || data.type !== "FeatureCollection") throw new Error("Invalid GeoJSON file.");

            const geometryTypes = new Set();
            const propertiesSet = new Set();
            data.features.forEach(feature => {
                if (feature.geometry) geometryTypes.add(feature.geometry.type);
                if (feature.properties) Object.keys(feature.properties).forEach(prop => propertiesSet.add(prop));
            });

            const downloadUrl = `/data/fetch_json_s3?file_name=${encodeURIComponent(fileName)}&prefix_key=geojson`;
            return `
                <div class="json-container">
                    <div><b>File:</b> ${fileName}</div>
                    <div><b>Label:</b> ${label}</div>
                    <div><b>Title:</b> ${title}</div>
                    <div><b>Reference:</b> <a href="${reference}" target="_blank" rel="noopener">${reference}</a></div>
                    <div><b>Decimation:</b> ${decimation}</div>
                    <div><b>Features:</b> ${data.features.length}</div>
                    <div><b>Geometry types:</b> ${Array.from(geometryTypes).join(', ')}</div>
                    <div><b>Properties:</b> ${Array.from(propertiesSet).join(', ')}</div>
                </div>
                <a href="${downloadUrl}" download="${fileName}" class="modal-cta-btn" style="margin-top:14px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Download GeoJSON</span>
                </a>
            `;
        } catch (error) {
            console.error("Error reading GeoJSON file:", error);
            return `<span style="color: red;">Error: ${error.message}</span>`;
        }
    }

    function createAuxTable() {
        const container = document.getElementById('auxTableContainer');

        // The legacy toggle button is hidden via CSS (#2DModelToggle { display:none }),
        // but we still create it for back-compat with anything that queries by id.
        const toggleButton = document.createElement('div');
        toggleButton.id = '2DModelToggle';

        const auxTableWrapper = document.createElement('div');
        auxTableWrapper.id = 'auxTableWrapper';
        auxTableWrapper.style.display = 'block';

        const auxTable = document.createElement('table');
        auxTable.id = 'auxDataTable';

        const header = document.createElement('thead');
        const headerRow = document.createElement('tr');
        ['2D Model', 'Title', 'Reference'].forEach(headerText => {
            const th = document.createElement('th');
            th.textContent = headerText;
            headerRow.appendChild(th);
        });
        header.appendChild(headerRow);
        auxTable.appendChild(header);

        const body = document.createElement('tbody');
        auxLabel.forEach((label, index) => {
            const row = document.createElement('tr');

            const modelCell = document.createElement('td');
            modelCell.style.textDecoration = 'underline';
            modelCell.style.cursor = 'pointer';
            modelCell.onclick = async () => {
                const rows = auxTable.querySelectorAll('tr');
                rows.forEach(r => r.classList.remove('highlighted-row'));
                row.classList.add('highlighted-row');

                const dataFile = auxData[index];
                const title = auxTitle[index];
                const reference = auxCitation[index][1];
                const decimation = auxDecimation[index];
                const summary = await summarizeGeoJSON(dataFile, label, title, reference, decimation);
                document.getElementById("jsonContent").innerHTML = summary;
                document.getElementById("mmodelname").textContent = label + " Metadata";
                openMetadataPanel();

                const iframe = document.getElementById('3dIframe');
                if (iframe && iframe.contentWindow) {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const selectDropdown = iframeDoc.getElementById('select2dSurface');
                    if (selectDropdown) {
                        const optionToSelect = Array.from(selectDropdown.options).find(option => option.value == index);
                        if (optionToSelect) {
                            selectDropdown.value = optionToSelect.value;
                            selectDropdown.dispatchEvent(new Event('change', { bubbles: true }));
                        }
                    }
                }
            };
            modelCell.textContent = label;
            row.appendChild(modelCell);

            const titleCell = document.createElement('td');
            titleCell.appendChild(document.createTextNode(auxTitle[index] + " "));

            const fileName = auxData[index];
            const apiUrl = `/data/fetch_json_s3?file_name=${encodeURIComponent(fileName)}&prefix_key=geojson`;

            const downloadLink = document.createElement('a');
            downloadLink.href = apiUrl;
            downloadLink.textContent = "Download GeoJSON";
            downloadLink.download = fileName;
            downloadLink.style.textDecoration = 'underline';
            downloadLink.style.marginLeft = '5px';
            titleCell.appendChild(downloadLink);

            row.appendChild(titleCell);

            const referenceCell = document.createElement('td');
            const link = document.createElement('a');
            link.href = auxCitation[index][1];
            link.textContent = auxCitation[index][0];
            link.target = '_blank';
            referenceCell.appendChild(link);
            row.appendChild(referenceCell);

            body.appendChild(row);
        });

        auxTable.appendChild(body);
        auxTableWrapper.appendChild(auxTable);
        container.appendChild(toggleButton);
        container.appendChild(auxTableWrapper);
    }

    // Sidebar toggle (mobile)
    document.getElementById("toggleSidebar")?.addEventListener("click", function () {
        document.getElementById("sidebarPanel")?.classList.toggle("hidden");
    });

    window.addEventListener("load", () => {
        populateLatLonInputs();
        initLatLonSliders();
        loadFileListAndJSON("-");
        document.getElementById('clearModelsBtn')?.addEventListener('click', clearAllModels);
    });
</script>
{% endblock %}
